<!DOCTYPE html>
<html lang="en">
<head>
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('wf-theme') || 'dark');</script>
  <meta charset="UTF-8" />
  <title>WorldFlight Planning</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body class="login-page no-layout">

  <div class="login-overlay"></div>

  <div class="login-container">
    <img src="/logo.png" alt="WorldFlight" class="login-logo" />

    <h1>WorldFlight</h1>
    <h2>Planning Portal</h2>

    <p class="login-subtitle" id="login-subtitle">
      Login using VATSIM Single Sign-On
    </p>

    <a href="/auth/login" class="login-btn" id="login-btn">
      Login with VATSIM
    </a>

  </div>

  <script>
    fetch('/api/dev-mode').then(r => r.json()).then(d => {
      if (d.devMode) {
        document.getElementById('login-subtitle').textContent = 'Offline Development Mode';
        document.getElementById('login-btn').textContent = 'Login Offline';
      }
    });
  </script>

</body>
</html>
